[pytest]
# Pytest configuration for EasyCFD backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default test paths
testpaths = tests

# Output options
addopts =
    # Show verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Enable strict markers (must be registered in conftest.py)
    --strict-markers
    # Show warnings
    -W default
    # Coverage options (if pytest-cov is installed)
    # --cov=easycfd_core
    # --cov-report=term-missing
    # --cov-report=html

# Markers (also registered in conftest.py)
markers =
    security: Security-critical tests that must always pass
    slow: Tests that take a long time to run
    integration: Integration tests that test multiple components

# Minimum Python version
minversion = 3.8

# Console output style
console_output_style = progress

# Log format for captured logs
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
